name: SonarCloud Core Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - "core/src/main/java/**"
      - "pom.xml"
      - ".github/workflows/sonarcloud-core.yml"

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Analyze Gentics Mesh core with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B -pl :mesh-core -am \
            -DskipTests \
            -Dskip.unit.tests \
            -Dskip.performance.tests \
            -Dskip.cluster.tests \
            package sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=amandesi13 \
            -Dsonar.projectKey=amandesi13_mesh \
            -Dsonar.projectName="Gentics Mesh Core - FPSS Task 3" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.inclusions=core/src/main/java/**/*.java \
            -Dsonar.exclusions=**/test/**,**/tests/**,**/target/**,**/*Test.java \
            -Dsonar.cpd.exclusions=**/* \
            -Dsonar.scm.disabled=true
