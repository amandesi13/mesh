name: SonarCloud Core Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - "core/src/main/java/**"
      - "pom.xml"
      - ".github/workflows/sonarcloud-core.yml"

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Test Gentics Mesh core with JaCoCo
        run: |
          mvn -B -pl :mesh-core -am \
            -DskipTests=false \
            -Dskip.unit.tests=false \
            -Dskip.performance.tests \
            -Dskip.cluster.tests \
            -Djacoco.skip=false \
            -Djacoco.version=0.8.11 \
            -Djacoco.propertyName=argLine \
            -Djacoco.destFile=target/jacoco.exec \
            -Djacoco.dataFile=target/jacoco.exec \
            org.jacoco:jacoco-maven-plugin:0.8.11:prepare-agent test org.jacoco:jacoco-maven-plugin:0.8.11:report

      - name: Analyze Gentics Mesh core with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B -f core/pom.xml sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=amandesi13 \
            -Dsonar.projectKey=amandesi13_mesh \
            -Dsonar.projectName="Gentics Mesh Core - FPSS Task 3" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.junit.reportPaths=target/surefire-reports \
            -Dsonar.inclusions=src/main/java/**/*.java \
            -Dsonar.exclusions=**/test/**,**/tests/**,**/target/**,**/*Test.java \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.cpd.exclusions=**/* \
            -Dsonar.scm.disabled=true
